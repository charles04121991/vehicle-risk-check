<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>車輛快速查詢</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#f5f6f8;color:#111827}header{background:#111827;color:#fff;padding:18px 20px;font-size:19px;font-weight:800}.wrap{max-width:620px;margin:auto;padding:36px 18px}.hero{text-align:center;margin-bottom:25px}.hero h1{margin:0 0 8px;font-size:28px}.hero p{margin:0;color:#6b7280;font-size:14px}.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 8px 28px #0000000f}label{display:block;font-size:13px;font-weight:800;margin:0 0 7px}.field{margin-bottom:17px}select,input{width:100%;padding:14px;border:1.5px solid #d1d5db;border-radius:10px;background:#fff;font-size:16px}input{font-size:21px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}button{width:100%;border:0;border-radius:10px;padding:15px;background:#111827;color:#fff;font-size:16px;font-weight:800}button:disabled{background:#9ca3af}.result{display:none;margin-top:20px}.plate{font-size:27px;font-weight:900;letter-spacing:2px}.meta{font-size:12px;color:#6b7280;margin:4px 0 18px}.item{padding:17px;border:1px solid #e5e7eb;border-radius:13px;margin-top:12px}.safe{background:#ecfdf5;border-color:#a7f3d0}.warn{background:#fffbeb;border-color:#fde68a}.danger{background:#fef2f2;border-color:#fecaca}.loading{background:#f9fafb}.title{font-weight:900;font-size:16px;margin-bottom:6px}.txt{font-size:13px;color:#4b5563;line-height:1.65}.summary{background:#111827;color:#fff;border-radius:13px;padding:18px;margin-top:14px}.summary small{color:#d1d5db}.summary div{font-size:17px;font-weight:900;line-height:1.55;margin-top:5px}.note{font-size:11px;color:#9ca3af;line-height:1.7;margin-top:17px;text-align:center}footer{text-align:center;color:#9ca3af;font-size:11px;padding:20px}
</style>
</head>
<body>
<header>🚘 車輛快速查詢</header>
<div class="wrap">
<div class="hero"><h1>輸入車牌，一鍵查詢</h1><p>快速查看官方失車資料與基本號牌分析</p></div>
<div class="card">
<div class="field"><label>牌照種類</label><select id="vehicleType"><option value="A">汽車</option><option value="B">重機車</option><option value="C">輕機車</option><option value="S">微電車</option><option value="T">拖車</option><option value="G">動力機械車</option><option value="TEMP">臨時牌</option><option value="R">試車牌</option></select></div>
<div class="field"><label>車牌號碼</label><input id="plateInput" maxlength="15" placeholder="例如：AXW-3000"></div>
<button id="btn" onclick="searchVehicle()">🔎 一鍵查詢</button>
<div id="result" class="result">
<div id="plate" class="plate"></div><div id="meta" class="meta"></div>
<div id="official" class="item loading"><div id="officialTitle" class="title">官方失車／號牌失竊</div><div id="officialText" class="txt">等待查詢</div></div>
<div id="format" class="item"><div id="formatTitle" class="title">號牌基本檢查</div><div id="formatText" class="txt">等待查詢</div></div>
<div class="summary"><small>綜合結果</small><div id="summary">等待查詢</div></div>
<div class="note">「查無資料」僅代表官方公開資料服務於該次查詢回傳查無相關失車資料，不代表車籍、所有權或號牌真偽已獲確認。如遇可疑車輛，請由警方或主管機關進一步確認。</div>
</div></div></div>
<footer>本平台非政府機關或執法單位｜官方資料以主管機關最新資訊為準</footer>
<script>
const API="https://vehicle-risk-check.onrender.com";
const $=id=>document.getElementById(id);
function text(id,v){$(id).textContent=v||""}
function state(id,s){$(id).className="item "+s}
async function searchVehicle(){
 const type=$("vehicleType").value, typeName=$("vehicleType").selectedOptions[0].text.trim();
 const plate=String($("plateInput").value||"").trim().toUpperCase().replace(/\s+/g,"");
 if(!plate){alert("請輸入車牌號碼");return}
 if(!/^[A-Z0-9-]+$/.test(plate)){alert("車牌只能包含英文字母、數字及連字號");return}
 $("result").style.display="block";text("plate",plate);text("meta",typeName+"｜"+new Date().toLocaleString("zh-TW",{hour12:false}));
 state("official","loading");text("officialTitle","🔄 正在查詢官方資料...");text("officialText","正在連線至官方公開資料服務。");text("summary","🔄 查詢中...");
 $("btn").disabled=true;$("btn").textContent="查詢中...";
 try{
  const r=await fetch(API+"/api/vehicle?"+new URLSearchParams({type,plate}));const d=await r.json();
  if(!r.ok||!d.success)throw new Error(d.message||"查詢失敗");
  const o=d.officialStolenVehicleCheck,f=d.plateAnalysis,v=d.overall;
  if(!o||!f||!v)throw new Error("後端回傳資料不完整");
  if(o.status==="NOT_FOUND"){state("official","safe");text("officialTitle","🟢 官方失車／號牌失竊：查無資料");text("officialText","官方結果："+o.resultText+"｜查詢時間："+o.queryTime)}
  else{state("official","danger");text("officialTitle","🚨 官方查詢出現失車相關資料");text("officialText","官方結果："+o.resultText+"。請勿自行攔截或接觸車輛，請由警方確認。")}
  state("format",f.basicFormatValid?"safe":"warn");text("formatTitle",f.basicFormatValid?"🟢 號牌基本格式未發現異常":"🟠 號牌輸入格式需要確認");text("formatText",f.message);
  text("summary",v.status==="HIGH_ATTENTION"?"🚨 官方失車查詢出現相關資料，請由警方進一步確認。":v.status==="REVIEW_INPUT"?"🟠 官方本次未顯示失車資料，但輸入格式有需要再次確認的項目。":"🟢 官方本次查無失車資料，基本號牌分析未發現明顯異常。");
 }catch(e){state("official","warn");text("officialTitle","⚠️ 官方資料目前無法確認");text("officialText",e.message||"請稍後再試");state("format","warn");text("formatTitle","⚪ 本次未完成完整分析");text("formatText","請稍後重新查詢。");text("summary","⚠️ 本次查詢未完整完成。")}
 finally{$("btn").disabled=false;$("btn").textContent="🔎 一鍵查詢"}
}
$("plateInput").addEventListener("input",function(){this.value=this.value.toUpperCase()});
$("plateInput").addEventListener("keydown",e=>{if(e.key==="Enter")searchVehicle()});
</script>
</body></html>
